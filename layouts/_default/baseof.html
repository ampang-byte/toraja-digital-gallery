<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{ .Title }}</title>

    <meta property="og:title" content="{{ .Title }}">
    <meta property="og:description" content="{{ .Params.sumber }} - {{ .Params.lokasi }}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{ .Permalink }}">
    <meta property="og:image" content="{{ .Params.image }}">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ .Title }}">
    <meta name="twitter:description" content="{{ .Params.sumber }}">
    <meta name="twitter:image" content="{{ .Params.image }}">

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <!-- HEADER -->
    {{ partial "header.html" . }}

    <!-- CONTENT -->
    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <!-- FOOTER -->
    {{ partial "footer.html" . }}

<script>
window.addEventListener("scroll", function() {
    const header = document.querySelector(".header");

    if (window.scrollY > 50) {
        header.classList.add("scrolled");
    } else {
        header.classList.remove("scrolled");
    }
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const img = document.querySelector(".lightbox-trigger");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    const close = document.querySelector(".lightbox-close");

    if (img) {
        img.onclick = function() {
            lightbox.style.display = "block";
            lightboxImg.src = this.src;
        }
    }

    close.onclick = function() {
        lightbox.style.display = "none";
    }

    lightbox.onclick = function(e) {
        if (e.target !== lightboxImg) {
            lightbox.style.display = "none";
        }
    }
});
</script>

</body>
</html>
