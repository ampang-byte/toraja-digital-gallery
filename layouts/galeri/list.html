{{ define "main" }}

<section class="section">
    <div class="container">
        <h1>Galeri</h1>

        <!-- DEBUG TOTAL -->
        <p>Total: {{ len (where (where .Site.Pages "Section" "galeri") "IsPage" true) }}</p>

        <div class="grid">
            {{ range where (where .Site.Pages "Section" "galeri") "IsPage" true }}

            <a href="{{ .RelPermalink }}" class="gallery-card">
               <img src="{{ .Params.image }}" alt="{{ .Title }}">

               <div class="gallery-overlay">
                    <h3>{{ .Title }}</h3>
                    <p>{{ .Date.Format "02 Jan 2006" }}</p>
               </div>
            </a>

            {{ end }}

        </div>
    </div>
</section>

{{ end }}
