{{ define "main" }}

<section class="section">
    <div class="container">

        <h1>Galeri</h1>

        <!-- 🔥 FILTER MENU TARUH DI SINI -->
        <div class="gallery-filter">
            <a href="/galeri/">Semua</a>
            <a href="/galeri/kategori/ritual-pemakaman/">Ritual Pemakaman</a>
            <a href="/galeri/kategori/ritual-syukuran/">Ritual Syukuran</a>
            <a href="/galeri/kategori/arsitektur-seni/">Arsitektur & Seni</a>
            <a href="/galeri/kategori/jejak-sejarah/">Jejak Sejarah</a>
            <a href="/galeri/kategori/lanskap-alam/">Lanskap & Alam</a>
            <a href="/galeri/kategori/sosial-aktivitas/">Sosial & Aktivitas</a>
        </div>

        <!-- GRID -->
        <div class="gallery-grid">

            {{ range .Pages.ByDate.Reverse }}

            <a href="{{ .RelPermalink }}" class="gallery-card">
                <div class="gallery-image">
                    <img src="{{ .Params.image }}" alt="{{ .Title }}">
                </div>
                <div class="gallery-info">
                    <h3>{{ .Title }}</h3>
                </div>
            </a>

            {{ end }}

        </div>

    </div>
</section>

{{ end }}
