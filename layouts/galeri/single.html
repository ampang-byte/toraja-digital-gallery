{{ define "main" }}

<section class="section">
    <div class="container">

        <h1>{{ .Title }}</h1>
        <p>{{ .Date.Format "02 Jan 2006" }}</p>

        <img src="{{ .Params.image }}" style="width:100%; max-width:800px; border-radius:10px;">

        <div style="margin-top:20px;">
            {{ .Content }}
        </div>

    </div>
</section>

{{ end }}
