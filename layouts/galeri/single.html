{{ define "main" }}

<section class="section">
    <div class="container">

<a href="/galeri/" class="back-btn">← Kembali ke Galeri</a>

        <div class="gallery-detail">

            <!-- GAMBAR -->
            <div class="gallery-image">
                <img src="{{ .Params.image }}" alt="{{ .Title }}" class="lightbox-trigger">
            </div>

            <!-- INFO -->
            <div class="gallery-info">

                <h1>{{ .Title }}</h1>

                <p><strong>Sumber:</strong> {{ .Params.sumber }}</p>
                <p><strong>Tahun Dokumentasi:</strong> {{ .Params.tahun }}</p>
                <p><strong>Lokasi:</strong> {{ .Params.lokasi }}</p>

                <div style="margin-top:20px;">
                    {{ .Content }}
                </div>

                <!-- SHARE REAL -->
                <div class="gallery-share">
                    <span>Bagikan:</span>

                    <a href="https://www.facebook.com/sharer/sharer.php?u={{ .Permalink }}" target="_blank">
                        Facebook
                    </a>

                    <a href="https://twitter.com/intent/tweet?url={{ .Permalink }}&text={{ .Title }}" target="_blank">
                        X
                    </a>

                    <a href="https://api.whatsapp.com/send?text={{ .Title }} {{ .Permalink }}" target="_blank">
                        WhatsApp
                    </a>

                </div>

            </div>

        </div>

    </div>
</section>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox">
    <span class="lightbox-close">&times;</span>
    <img class="lightbox-content" id="lightbox-img">
</div>

{{ end }}
