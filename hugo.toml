baseURL = "https://toraja-digital-gallery.pages.dev/"
languageCode = "id-id"
title = "Toraja Digital Gallery"
theme = "PaperMod"

[params]
    env = "production"
    title = "Toraja Digital Gallery"
    description = "Lumbung Digital Kebudayaan Toraja"
    defaultTheme = "auto"
    ShowReadingTime = true
    ShowShareButtons = true
    ShowPostNavLinks = true
    ShowBreadCrumbs = true

[params.assets]
    disableHLJS = true

[params.profileMode]
    enabled = true
    title = "Toraja Digital Gallery"
    subtitle = "Menjaga Tradisi, Melintasi Zaman. Dokumentasi digital warisan leluhur Tana Toraja."
    displaySubtitle = true
    imageUrl = ""

    [[params.profileMode.buttons]]
        name = "📖 Jelajahi Artikel"
        url = "/categories/artikel/"

    [[params.profileMode.buttons]]
        name = "📷 Lihat Galeri"
        url = "/categories/galeri-foto/"

[[menu.main]]
    name = "Beranda"
    url = "/"
    weight = 10

[[menu.main]]
    name = "Artikel"
    url = "/categories/artikel/"
    weight = 20

[[menu.main]]
    name = "Galeri Foto"
    url = "/categories/galeri-foto/"
    weight = 30

[[menu.main]]
    name = "Sastra Toraja"
    url = "/tags/sastra/"
    weight = 40

[[menu.main]]
    name = "Tentang Kami"
    url = "/posts/selamat-datang/"
    weight = 50
