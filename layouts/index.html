{{ define "main" }}

<section style="padding:80px 20px; text-align:center; background:#111; color:white;">
    <h1>Toraja Digital Gallery</h1>
    <p>Menjaga Tradisi, Melintasi Zaman</p>
</section>

<section style="padding:40px;">
    <h2>Artikel Terbaru</h2>

    {{ range first 5 .Site.RegularPages }}
        <p>
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </p>
    {{ end }}

</section>

{{ end }}
