baseURL = 'https://toraja-digital-gallery.netlify.app/'
languageCode = 'id-id'
title = 'Toraja Digital Gallery'
theme = 'PaperMod'

# PENGATURAN UMUM
[params]
    env = "production"
    title = "Toraja Digital Gallery"
    description = "Lumbung Digital Kebudayaan Toraja: Dokumentasi Adat, Tradisi, dan Galeri Foto Tempo Dulu."
    author = "Toraja Digital Gallery Team"
    
    # Fitur Tambahan
    ShowReadingTime = true
    ShowShareButtons = true
    ShowPostNavLinks = true
    ShowBreadCrumbs = true
    ShowCodeCopyButtons = true
    
    # Pengaturan Gambar
    assets = { disableHLJS = true }

# PENGATURAN HALAMAN DEPAN (PROFILE MODE)
[params.profileMode]
    enabled = true
    title = "Toraja Digital Gallery"
    subtitle = "Menjaga Tradisi, Melintasi Zaman. Dokumentasi digital warisan leluhur Tana Toraja."
    displaySubtitle = true
    imageUrl = "header-toraja.jpg"
    imageTitle = "Tongkonan Toraja"
    imageWidth = 600    # Ukuran gambar header
    imageHeight = 338   # Mengikuti rasio 16:9 (1080px)
    
    [[params.profileMode.buttons]]
        name = "📖 Jelajahi Artikel"
        url = "/categories/artikel/"
    
    [[params.profileMode.buttons]]
        name = "📷 Galeri Foto"
        url = "/categories/galeri-foto/"

# MENU NAVIGASI (NAVBAR)
[[menu.main]]
    name = "Beranda"
    url = "/"
    weight = 10

[[menu.main]]
    name = "Artikel"
    url = "/categories/artikel/"
    weight = 20

[[menu.main]]
    name = "Galeri Foto"
    url = "/categories/galeri-foto/"
    weight = 30

[[menu.main]]
    name = "Sastra Toraja"
    url = "/tags/sastra/"
    weight = 40

[[menu.main]]
    name = "Tentang Kami"
    url = "/posts/selamat-datang/"
    weight = 50

# PENGATURAN TAXONOMY (KATEGORI & TAG)
[taxonomies]
    category = "categories"
    tag = "tags"
    series = "series"