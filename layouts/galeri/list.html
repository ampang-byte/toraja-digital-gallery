{{ define "main" }}

<section class="section">
    <div class="container">

        <h1>Galeri</h1>

<!-- 🔥 FILTER AUTO -->
<div class="gallery-filter">

    <!-- SEMUA -->
    <a href="/galeri/" 
       class="filter-btn {{ if eq .RelPermalink "/galeri/" }}active{{ end }}">
       Semua
    </a>

    <!-- AUTO KATEGORI -->
    {{ range $name, $taxonomy := .Site.Taxonomies.kategori }}

        <a href="/galeri/kategori/{{ $name | urlize }}/"
           class="filter-btn {{ if in $.RelPermalink $name }}active{{ end }}">

            {{ $name | humanize }}

        </a>

    {{ end }}

</div>

        <!-- GRID -->
        <div class="gallery-grid">

            {{ range .Pages.ByDate.Reverse }}

            <a href="{{ .RelPermalink }}" class="gallery-card">
                <div class="gallery-image">
                    <img src="{{ .Params.image }}" alt="{{ .Title }}">
                </div>
                <div class="gallery-info">
                    <h3>{{ .Title }}</h3>
                </div>
            </a>

            {{ end }}

        </div>

    </div>
</section>

{{ end }}
