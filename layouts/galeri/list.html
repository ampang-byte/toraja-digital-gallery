{{ define "main" }}

<section class="section">
    <div class="container">
        <h1>Galeri</h1>

        <div class="galeri-list">
            {{ range where .Site.RegularPages "Section" "galeri" }}

            <a href="{{ .RelPermalink }}" class="gallery-card">

               <img src="{{ .Params.image }}">

               <div class="gallery-overlay">
                    <h3>{{ .Title }}</h3>
                    <p>{{ .Date.Format "02 Jan 2006" }}</p>
               </div>

            </a>

            {{ end }}
        </div>

    </div>
</section>

{{ end }}
