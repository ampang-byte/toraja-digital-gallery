{{ define "main" }}

<section class="section">
    <div class="container">

        <h1>Galeri</h1>

        <!-- 🔥 FILTER MENU TARUH DI SINI -->
        <div class="gallery-filter">
            <a href="/galeri/" class="filter-btn {{ if eq .RelPermalink "/galeri/" }}active{{ end }}">Semua</a>

            <a href="/galeri/kategori/ritual-pemakaman/" 
               class="filter-btn {{ if in .RelPermalink "ritual-pemakaman" }}active{{ end }}">
               Ritual Pemakaman
            </a>

            <a href="/galeri/kategori/ritual-syukuran/" 
               class="filter-btn {{ if in .RelPermalink "ritual-syukuran" }}active{{ end }}">
               Ritual Syukuran
            </a>

            <a href="/galeri/kategori/arsitektur-seni/" 
               class="filter-btn {{ if in .RelPermalink "arsitektur-seni" }}active{{ end }}">
               Arsitektur & Seni
            </a>

            <a href="/galeri/kategori/jejak-sejarah/" 
               class="filter-btn {{ if in .RelPermalink "jejak-sejarah" }}active{{ end }}">
               Jejak Sejarah
            </a>

            <a href="/galeri/kategori/lanskap-alam/" 
               class="filter-btn {{ if in .RelPermalink "lanskap-alam" }}active{{ end }}">
               Lanskap & Alam
            </a>

            <a href="/galeri/kategori/sosial-aktivitas/" 
               class="filter-btn {{ if in .RelPermalink "sosial-aktivitas" }}active{{ end }}">
               Sosial & Aktivitas
            </a>
       </div>


        <!-- GRID -->
        <div class="gallery-grid">

            {{ range .Pages.ByDate.Reverse }}

            <a href="{{ .RelPermalink }}" class="gallery-card">
                <div class="gallery-image">
                    <img src="{{ .Params.image }}" alt="{{ .Title }}">
                </div>
                <div class="gallery-info">
                    <h3>{{ .Title }}</h3>
                </div>
            </a>

            {{ end }}

        </div>

    </div>
</section>

{{ end }}
