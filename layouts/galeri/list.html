{{ define "main" }}

<section class="section">
    <div class="container">
        <h1>Galeri</h1>

        <div class="grid">
            {{ range .Pages }}
            <a href="{{ .RelPermalink }}" class="card">
                <img src="{{ .Params.image }}" style="width:100%; border-radius:10px;">
                
                <div class="card-content">
                    <h3>{{ .Title }}</h3>
                    <p>{{ .Date.Format "02 Jan 2006" }}</p>
                </div>
            </a>
            {{ end }}
        </div>
    </div>
</section>

{{ end }}
