{{ define "main" }}

<!-- HERO -->
<section class="hero">

    <!-- GAMBAR DESKTOP -->
    <img src="/img/header-toraja.jpg" class="hero-img desktop">

    <!-- GAMBAR MOBILE -->
    <img src="/img/header-toraja-mobile.jpg" class="hero-img mobile">

    <!-- OVERLAY -->
    <div class="hero-overlay"></div>

    <!-- CONTENT -->
    <div class="hero-content fade-in">
        <h1 class="hero-title">Toraja Digital Gallery</h1>
        <p class="hero-subtitle">Menjaga Tradisi, Melintasi Zaman</p>

        <div class="hero-btns">
            <a href="/posts/" class="btn">Jelajahi Artikel</a>
            <a href="/galeri/" class="btn btn-outline">Lihat Galeri</a>
        </div>
    </div>

</section>

<!-- ARTIKEL -->
<section class="section">
    <h2>Artikel Terbaru</h2>

    <div class="grid">
        {{ range first 3 (where .Site.RegularPages "Section" "posts") }}
        <a href="{{ .RelPermalink }}" class="card">
            <div class="card-content">
                <h3>{{ .Title }}</h3>
                <p>{{ .Summary }}</p>
            </div>
        </a>
        {{ end }}
    </div>
</section>

{{ end }}
